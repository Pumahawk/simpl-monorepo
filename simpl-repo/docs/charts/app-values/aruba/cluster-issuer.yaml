apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: issuer-ingress
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dario.andrei@staff.aruba.it
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
