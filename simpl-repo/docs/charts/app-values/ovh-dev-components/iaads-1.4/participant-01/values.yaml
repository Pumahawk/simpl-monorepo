postgresql:
  fullnameOverride: postgresql
  primary:
    persistence:
      size: 1Gi
    initdb:
      scripts:
        init.sql: |
          CREATE USER keycloak WITH PASSWORD 'keycloak' CREATEDB;
          CREATE DATABASE keycloak OWNER keycloak;
          CREATE USER usersroles WITH PASSWORD 'usersroles' CREATEDB;
          CREATE DATABASE usersroles OWNER usersroles;
          CREATE USER authenticationprovider WITH PASSWORD 'authenticationprovider' CREATEDB;
          CREATE DATABASE authenticationprovider OWNER authenticationprovider;
redis:
  fullnameOverride: redis
  replica:
    replicaCount: 1
    persistence:
      size: 1Gi
  master:
    persistence:
      size: 1Gi
  auth:
    password: "admin"

keycloak:
  resources:
    limits:
      cpu: 750m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  fullnameOverride: keycloak
  apiUrl: "https://t1.iaa-participant-1-4.dev.simpl-europe.eu" # update
  extraEnvVars: 
    - name: KC_HOSTNAME_ADMIN
      value: "https://t1.iaa-participant-1-4.dev.simpl-europe.eu/auth" # update
    - name: KC_HOSTNAME
      value: "https://t1.iaa-participant-1-4.dev.simpl-europe.eu/auth" # update
    - name: USERS_ROLES_BASE_URL
      value: "http://users-roles.iaa-participant-1-4.svc.cluster.local:8080" # update
    - name: KEYCLOAK_BASE_URL
      value: "https://t1.iaa-participant-1-4.dev.simpl-europe.eu/auth" # update
    - name: REALM
      value: "participant" # update
    - name: KEYCLOAK_EXTRA_ARGS
      value: --import-realm

  auth:
    adminUser: "admin" # update
    adminPassword: "admin" # update

  postgresql:
    enabled: false

  externalDatabase:
    annotations: {}
    database: keycloak
    existingSecret: ""
    existingSecretDatabaseKey: ""
    existingSecretHostKey: ""
    existingSecretPasswordKey: ""
    existingSecretPortKey: ""
    existingSecretUserKey: ""
    host: "postgresql.iaa-participant-1-4.svc.cluster.local" # update
    password: keycloak
    port: 5432
    user: keycloak

  extraVolumes:
    - name: spi-volume
      emptyDir: {}
    - name: realm-volume
      emptyDir: {}

  extraVolumeMounts:
    - name: spi-volume
      mountPath: /opt/bitnami/keycloak/providers/keycloak-authenticator.jar
      subPath: keycloak-authenticator.jar
    - name: realm-volume
      mountPath: /opt/bitnami/keycloak/data/import/realm.json
      subPath: realm.json

  initContainers: 
    - name: init-spi
      image: curlimages/curl
      command: ["/bin/sh", "-c"]
      env:
        - name: ARTIFACT
          value: keycloak-authenticator
        - name: URL
          value: https://code.europa.eu/api/v4/projects/915/packages/maven/com/aruba/simpl/keycloak-authenticator/1.0.0/keycloak-authenticator-1.0.0.jar
      args:
        - |
          curl -o /custom-spi/${ARTIFACT}.jar ${URL};
      volumeMounts:
        - name: spi-volume
          mountPath: /custom-spi

    - name: import-realm
      image: curlimages/curl
      command: ["/bin/sh", "-c"]
      env:
        - name: REALM_NAME
          value: realm
        - name: URL
          # uncomment below if you are deploying an authority
          #value: https://code.europa.eu/simpl/simpl-open/development/iaa/charts/-/raw/develop/samples/keycloak-realms/1.0.0/authority-realm-export.json?ref_type=heads
          # uncomment below if you are deploying a participant
          value: https://code.europa.eu/simpl/simpl-open/development/iaa/charts/-/raw/develop/samples/keycloak-realms/1.0.0/participant-realm-export.json?ref_type=heads&inline=false
      args:
        - |
          curl -o /config/${REALM_NAME}.json ${URL};
      volumeMounts:
        - name: realm-volume
          mountPath: /config


tier1-gateway:
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 300Mi
  hostT1: t1.iaa-participant-1-4.dev.simpl-europe.eu #your t1 host
  profile: participant
  cors:
    allowOrigin: https://fe.iaa-participant-1-4.dev.simpl-europe.eu,http://localhost:4202,http://localhost:3000 #cors origin separated by comma

  ingress:
    issuer: dev-prod #the issuer of the ingress certificate

  ejbcaUrl: http://ejbca-community-helm.{{ .Release.Namespace }}.svc.cluster.local:30080 # comment this line if profile is `participant`
  identityProviderUrl: http://identity-provider.{{ .Release.Namespace }}.svc.cluster.local:8080 # comment this line if profile is `participant`
  keycloakUrl: http://keycloak.{{ .Release.Namespace }}.svc.cluster.local
  onboardingUrl: http://onboarding.{{ .Release.Namespace }}.svc.cluster.local:8080 # comment this line if profile is `participant`
  securityAttributesProviderUrl: http://security-attributes-provider.{{ .Release.Namespace }}.svc.cluster.local:8080 # comment this line if profile is `participant`
  usersRolesUrl: http://users-roles.{{ .Release.Namespace }}.svc.cluster.local:8080
  authenticationProviderUrl: http://authentication-provider.{{ .Release.Namespace }}.svc.cluster.local:8080


  # Spring Cloud Gateway Routes Participant
  appConfig:
    spring:
      cloud:
        gateway:
          routes:
            - id: keycloak
              uri: ${keycloak.url}
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            - id: users-roles
              uri: ${users-roles.url}
              predicates:
                - Path=/user-api/**
              filters:
                - StripPrefix=1
            - id: users-rolesV1
              uri: ${users-roles.url}
              predicates:
                - Path=/userApi/**
              filters:
                - StripPrefix=1
            - id: authentication-provider
              uri: ${authentication-provider.url}
              predicates:
                - Path=/auth-api/**
              filters:
                - StripPrefix=1
            - id: authentication-providerV1
              uri: ${authentication-provider.url}
              predicates:
                - Path=/authApi/**
              filters:
                - StripPrefix=1
            # CLI configurations
            - id: cli-authentication-providerV1
              uri: ${authentication-provider.url}
              predicates:
                - Path=
                  /cli/authApi/v1/csr/generate,
                  /cli/authApi/v1/keypairs/generate,
                  /cli/authApi/v1/keypairs,
                  /cli/authApi/v1/credentials,
                  /cli/authApi/v1/credentials/download,
                  /cli/authApi/v1/agent/ping
              filters:
                - StripPrefix=2
                - name: ClientCredentialsFilter
                  args:
                    # Here you specify the clientid and the required client role to invoke this api
                    # in the following order: 
                    # client-id-name: client-role-1, client-role-1
                    # The default configuration is shown below.
                    cli: cli-role
            - id: cli-users-and-rolesV1
              uri: ${users-roles.url}
              predicates:
                - Path=
                  /cli/userApi/v1/users/import,
                  /cli/userApi/v1/roles/import,
                  /cli/userApi/v1/roles/*/identityAttributes
              filters:
                - StripPrefix=2
                - name: ClientCredentialsFilter
                  args:
                    # Here you specify the clientid and the required client role to invoke this api
                    # in the following order: 
                    # client-id-name: client-role-1, client-role-1
                    # The default configuration is shown below.
                    cli: cli-role
    
    springdoc:
      swagger-ui:
        urls:
          - url: /user-api/v3/api-docs
            name: Users & Roles Service
          - url: /auth-api/v3/api-docs
            name: Authentication Provider Service

    keycloak:
      app:
        realm: participant
    
    routes:
      public-urls:
        - method: GET
          path: "/swagger-ui.html"
        - method: GET
          path: "/swagger-ui/**"
        - method: GET
          path: "/v3/api-docs/**"
        - method: GET
          path: "/actuator/health/**"
        - method: GET
          path: "/actuator/info/**"
        - method: GET
          path: /userApi/v1/info/version
        - method: GET
          path: /authApi/v1/info/version
    
      denied-urls:
        - method: GET
          path: "/auth-api/keypair"
        - method: GET
          path: "/authApi/v1/keypairs"
        - path: "/user-api/mtls/**"
        - path: "/auth-api/mtls/**"
        - path: "/userApi/v1/mtls/**"
        - path: "/authApi/v1/mtls/**"

      rbac:
        - path: "/user-api/agent/identity-attributes"
          method: GET
          roles:
            - T1UAR_M
        - path: "/userApi/v1/agent/identity-attributes"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/agent/identity-attributes/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/userApi/v1/agent/identity-attributes/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/identity-attribute/search"
          method: GET
          roles:
            - T1UAR_M
        - path: "/userApi/v1/identity-attribute/search"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/role/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/userApi/v1/role/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/role"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/userApi/v1/role"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/user-api/role/*/identity-attributes"
          method: POST
          roles:
            - T1UAR_M
        - path: "/userApi/v1/role/*/identity-attributes"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/role/*/identity-attributes"
          method: PUT
          roles:
            - T1UAR_M
            - ONBOARDER_M
        - path: "/userApi/v1/role/*/identity-attributes"
          method: PUT
          roles:
            - T1UAR_M
            - ONBOARDER_M
        - path: "/user-api/role/delete-attribute"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/userApi/v1/role/delete-attribute"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/user-api/role/*"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/userApi/v1/role/*"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/user-api/role/search"
          method: GET
          roles:
            - T1UAR_M
        - path: "/userApi/v1/role/search"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/role/*/duplicate-identity-attribute"
          method: POST
          roles:
            - T1UAR_M
        - path: "/userApi/v1/role/*/duplicate-identity-attribute"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/user/as-t1user"
          method: POST
          roles:
            - T1UAR_M
        - path: "/userApi/v1/user/as-t1user"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/user/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/userApi/v1/user/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/user/*"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/userApi/v1/user/*"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/user-api/user/*"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/userApi/v1/user/*"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/auth-api/keypair/**"
          roles:
            - ONBOARDER_M 
        - path: "/authApi/v1/keypairs/**"
          roles:
            - ONBOARDER_M
        - method: POST
          path: "/auth-api/csr/generate"
          roles:
            - ONBOARDER_M 
        - method: POST
          path: "/authApi/v1/csr/generate"
          roles:
            - ONBOARDER_M 
        - path: "/auth-api/keypair" 
          method: HEAD
          roles:
            - ONBOARDER_M
        - path: "/authApi/v1/keypairs"
          method: HEAD
          roles:
            - ONBOARDER_M
        - path: "/auth-api/keypair" 
          method: POST
          roles:
            - ONBOARDER_M
        - path: "/authApi/v1/keypairs"
          method: POST
          roles:
            - ONBOARDER_M



