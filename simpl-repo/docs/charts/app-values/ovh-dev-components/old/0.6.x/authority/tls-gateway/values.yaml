image:
  tag: 0.6.2
global:
  profile: authority
  cors:
    allowOrigin: https://authority.fe.dev.simpl-europe.eu,https://authority.be.dev.simpl-europe.eu,http://localhost:4202,http://localhost:3000
ssl:
  keystore:
    password: "keystore-generated-password"

authorityUrlT1: "https://authority.be.dev.simpl-europe.eu"

microservices:
  usersRolesUrl: http://users-roles.iaa.svc.cluster.local:8080
  securityAttributesProviderUrl: http://security-attributes-provider.iaa.svc.cluster.local:8080
  keycloakUrl: http://keycloak.iaa.svc.cluster.local
  identityProviderUrl: http://identity-provider.iaa.svc.cluster.local:8080

redis:
  host: "redis-master.iaa.svc.cluster.local"
  port: "6379"
  username: default
  password: admin

hostT2: tls.authority.dev.simpl-europe.eu

springRoutes:
  - id: sap
    uri: ${sap.url}
    predicates:
      - Path=/sap-api/mtls/**
    filters:
      - StripPrefix=1
  - id: identity-provider
    uri: ${identity-provider.url}
    predicates:
      - Path=/identity-api/mtls/**
    filters:
      - StripPrefix=1
  - id: users-roles
    uri: ${users-roles.url}
    predicates:
      - Path=/user-api/mtls/**
    filters:
      - StripPrefix=1
routes:
  publicUrls:
    - method: GET
      path: "/actuator/**"

  abac:
    - method: PATCH
      path: "/identity-api/mtls/public-key"
      disableEphemeralProofCheck: true
    - method: POST
      path: "/identity-api/mtls/token"
      disableEphemeralProofCheck: true
    - method: POST
      path: "/user-api/mtls/ephemeral-proof"
      disableEphemeralProofCheck: true