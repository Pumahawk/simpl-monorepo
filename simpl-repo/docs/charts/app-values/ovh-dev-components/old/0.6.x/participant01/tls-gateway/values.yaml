image:
  tag: 0.6.2
  
global:
  profile: participant
  cors:
    allowOrigin: https://participant01-be.dev.simpl-europe.eu,https://participant01-fe.dev.simpl-europe.eu,http://localhost:4202,http://localhost:3000
ssl:
  keystore:
    password: "keystore-generated-password"

authorityUrlT1: "https://authority.be.dev.simpl-europe.eu"

microservices:
  usersRolesUrl: http://users-roles.iaa-01.svc.cluster.local:8080
  keycloakUrl: http://keycloak.iaa-01.svc.cluster.local

redis:
  host: "redis-master.iaa-01.svc.cluster.local"
  port: "6379"
  username: default
  password: admin

hostT2: tls-participant01.dev.simpl-europe.eu

springRoutes:
  - id: users-roles
    uri: ${users-roles.url}
    predicates:
      - Path=/user-api/mtls/**
    filters:
      - StripPrefix=1

routes:
  publicUrls:
    - method: GET
      path: "/actuator/**"
  abac:
    - method: POST
      path: "/user-api/mtls/ephemeral-proof"
      disableEphemeralProofCheck: true