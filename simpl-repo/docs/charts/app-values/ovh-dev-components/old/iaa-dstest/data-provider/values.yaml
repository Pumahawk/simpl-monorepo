global:
  cors:
    allowOrigin: https://t1.iaa-dstest-data-provider.dev.simpl-europe.eu,https://fe.iaa-dstest-data-provider.dev.simpl-europe.eu,http://localhost:4202,http://localhost:3000
  hostBe: t1.iaa-dstest-data-provider.dev.simpl-europe.eu
  hostTls: t2.iaa-dstest-authority.dev.simpl-europe.eu # authority
  ingress:
    issuer: dev-prod
  profile: participant

postgresql:
  fullnameOverride: postgresql
  primary:
    persistence:
      size: 1Gi
    initdb:
      scripts:
        init.sql: |
          CREATE USER keycloak WITH PASSWORD 'keycloak' CREATEDB;
          CREATE DATABASE keycloak OWNER keycloak;
          CREATE USER usersroles WITH PASSWORD 'usersroles' CREATEDB;
          CREATE DATABASE usersroles OWNER usersroles;
          CREATE USER authenticationprovider WITH PASSWORD 'authenticationprovider' CREATEDB;
          CREATE DATABASE authenticationprovider OWNER authenticationprovider;
redis:
  fullnameOverride: redis
  replica:
    replicaCount: 1
    persistence:
      size: 1Gi
  master:
    persistence:
      size: 1Gi
  auth:
    password: "admin"

keycloak:
  resources:
    limits:
      cpu: 750m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  fullnameOverride: keycloak
  apiUrl: "https://t1.iaa-dstest-data-provider.dev.simpl-europe.eu"
  extraEnvVars:
    - name: KC_HOSTNAME_ADMIN
      value: "https://t1.iaa-dstest-data-provider.dev.simpl-europe.eu/auth"
    - name: KC_HOSTNAME
      value: "https://t1.iaa-dstest-data-provider.dev.simpl-europe.eu/auth"
    - name: USERS_ROLES_BASE_URL
      value: "http://users-roles.iaa-dstest-data-provider.svc.cluster.local:8080"
    - name: KEYCLOAK_BASE_URL
      value: "https://t1.iaa-dstest-data-provider.dev.simpl-europe.eu/auth"
    - name: REALM
      value: "participant"
    - name: KEYCLOAK_EXTRA_ARGS
      value: --import-realm

  auth:
    adminPassword: "admin"

  postgresql:
    enabled: false

  externalDatabase:
    host: "postgresql.iaa-dstest-data-provider.svc.cluster.local"
    port: 5432
    user: keycloak
    database: keycloak
    password: "keycloak"
    existingSecret: ""
    existingSecretHostKey: ""
    existingSecretPortKey: ""
    existingSecretUserKey: ""
    existingSecretDatabaseKey: ""
    existingSecretPasswordKey: ""
    annotations: {}

  extraVolumes:
    - name: spi-volume
      emptyDir: {}
    - name: realm-volume
      emptyDir: {}

  extraVolumeMounts:
    - name: spi-volume
      mountPath: /opt/bitnami/keycloak/providers/keycloak-authenticator.jar
      subPath: keycloak-authenticator.jar
    - name: realm-volume
      mountPath: /opt/bitnami/keycloak/data/import/realm.json
      subPath: realm.json

  initContainers:
    - name: init-spi
      image: curlimages/curl
      command: ["/bin/sh", "-c"]
      env:
        - name: ARTIFACT
          value: keycloak-authenticator
        - name: URL
          value: https://code.europa.eu/api/v4/projects/915/packages/maven/com/aruba/simpl/keycloak-authenticator/1.0.0/keycloak-authenticator-1.0.0.jar
      args:
        - |
          curl -o /custom-spi/${ARTIFACT}.jar ${URL};
      volumeMounts:
        - name: spi-volume
          mountPath: /custom-spi

    - name: import-realm
      image: curlimages/curl
      command: ["/bin/sh", "-c"]
      env:
        - name: REALM_NAME
          value: realm
        - name: URL
          value: https://code.europa.eu/simpl/simpl-open/development/iaa/charts/-/raw/develop/samples/keycloak-realms/0.8.0/participant-realm-export.json?ref_type=heads&inline=false
      args:
        - |
          curl -o /config/${REALM_NAME}.json ${URL};
      volumeMounts:
        - name: realm-volume
          mountPath: /config


simpl-cloud-gateway:
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 300Mi
  keycloakUrl: http://keycloak.iaa-dstest-data-provider.svc.cluster.local
  usersRolesUrl: http://users-roles.iaa-dstest-data-provider.svc.cluster.local:8080
  authenticationProviderUrl: http://authentication-provider.iaa-dstest-data-provider.svc.cluster.local:8080

  # Spring Cloud Gateway Routes Participant
  appConfig:
    spring:
      cloud:
        gateway:
          routes: 
            - id: keycloak
              uri: ${keycloak.url}
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            - id: users-roles
              uri: ${users-roles.url}
              predicates:
                - Path=/user-api/**
              filters:
                - StripPrefix=1
            - id: authentication-provider
              uri: ${authentication-provider.url}
              predicates:
                - Path=/auth-api/**
              filters:
                - StripPrefix=1
            # Cli configurations
            - id: cli-authentication-providerV1
              uri: ${authentication-provider.url}
              predicates:
                - Path=
                  /cli/authApi/v1/csr/generate,
                  /cli/authApi/v1/keypairs/generate,
                  /cli/authApi/v1/keypairs,
                  /cli/authApi/v1/credentials,
                  /cli/authApi/v1/credentials/download,
                  /cli/authApi/v1/agent/ping
              filters:
                - StripPrefix=2
                - name: ClientCredentialsFilter
                  args:
                    #clientid: requiredRole1,requiredRole2
                    cli: cli-role
            - id: cli-users-and-rolesV1
              uri: ${users-roles.url}
              predicates:
                - Path=
                  /cli/userApi/v1/users/import,
                  /cli/userApi/v1/roles/import,
                  /cli/userApi/v1/roles/*/identityAttributes
              filters:
                - StripPrefix=2
                - name: ClientCredentialsFilter
                  args:
                    #clientid: requiredRole1,requiredRole2
                    cli: cli-role
    springdoc:
      swagger-ui:
        urls:
          - url: /user-api/v3/api-docs
            name: Users & Roles Service
          - url: /auth-api/v3/api-docs
            name: Authentication Provider Service

    routes:
      public-urls:
        - method: GET
          path: "/swagger-ui.html"
        - method: GET
          path: "/swagger-ui/**"
        - method: GET
          path: "/v3/api-docs/**"
        - method: GET
          path: "/actuator/**"

      denied-urls:
        - method: GET
          path: "/auth-api/keypair"

      rbac:
        - path: "/user-api/agent/identity-attributes"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/agent/identity-attributes/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/identity-attribute/search"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/role/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/role"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/user-api/role/*/identity-attributes"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/role/delete-attribute"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/user-api/role/*"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/user-api/role/search"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/role/*/duplicate-identity-attribute"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/user/as-t1user"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/user/**"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/user/**"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/user-api/user/*"
          method: DELETE
          roles:
            - T1UAR_M
        - method: POST
          path: "/auth-api/keypair/import"
          roles:
            - ONBOARDER_M 
        - path: "/auth-api/keypair/**"
          roles:
            - ONBOARDER_M 
        - method: POST
          path: "/auth-api/csr/generate"
          roles:
            - ONBOARDER_M 
        - path: "/auth-api/keypair"
          method: HEAD
          roles:
            - ONBOARDER_M



simpl-fe:
  image:
    tag: 1.1.0-eui-ds
  resources:
    limits:
      cpu: 250m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 50Mi
  hostFe: fe.iaa-dstest-data-provider.dev.simpl-europe.eu
  cors:
    allowOrigin: https://t1.iaa-dstest-data-provider.dev.simpl-europe.eu,https://fe.iaa-dstest-data-provider.dev.simpl-europe.eu,http://localhost:4202,http://localhost:4203,http://localhost:3000
  ingress:
    issuer: dev-prod

  env:
  - name: API_URL
    value: "https://t1.iaa-dstest-data-provider.dev.simpl-europe.eu"
  - name: KEYCLOAK_URL
    value: "https://t1.iaa-dstest-data-provider.dev.simpl-europe.eu/auth"
  - name: KEYCLOAK_REALM
    value: "participant"
  - name: KEYCLOAK_CLIENT_ID
    value: "frontend-cli"

  microfrontends:
  - name: usersroles
    application: usersandroles
    path: "/users-roles"
  - name: participant
    application: participant-utility
    path: "/participant-utility"

users-roles:
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 300Mi
  db:
    url: "jdbc:postgresql://postgresql.iaa-dstest-data-provider.svc.cluster.local:5432/usersroles"
    username: "usersroles"
    password: "usersroles"

  keycloak:
    master:
      user: "user"
      password: "admin"
    clientToRealmRoleMigration:
      enabled: true # set to true to import realm roles from client roles
      clientIds:  "['frontend-cli']" # Add clients from which you want to copy the roles, separated by commas (e.g., frontend-cli,client-1,client-2).

  microservices:
    authenticationProviderUrl: http://authentication-provider.iaa-dstest-data-provider.svc.cluster.local:8080

  databaseSeeding:
    roleIdentityAttributesMapping:
      # If you want to start with an empty identity attributes table, set this to false.
      # Ff enabled is set to true and filePath is commented or empty the table will be initialized with the default seeding file.
      enabled: true 

      # To specify your custom attributes, uncomment and provide the path to your JSON file here.
      # filePath must start with 'file:'
      # You can find an example of seeding file in samples/db-seeding/user-roles/0.8.x/roleAttributes.default.json
      # filePath: file:/app/config/exampleRoleAttributes.json 

tls-gateway:
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 300Mi
  keypair:
    algorithm: EC

  microservices:
    usersRolesUrl: http://users-roles.iaa-dstest-data-provider.svc.cluster.local:8080 
    keycloakUrl: http://keycloak.iaa-dstest-data-provider.svc.cluster.local
    authenticationProviderUrl: http://authentication-provider.iaa-dstest-data-provider.svc.cluster.local:8080

  redis:
    host: "redis-master.iaa-dstest-data-provider.svc.cluster.local"
    port: "6379"
    username: "default"
    password: "admin"

  authorityUrlT1: "https://t1.iaa-dstest-authority.dev.simpl-europe.eu"
  hostT2: "t2.iaa-dstest-data-provider.dev.simpl-europe.eu"
  appConfig:
    spring:
      cloud:
        gateway:
          routes:
            - id: users-roles
              uri: ${users-roles.url}
              predicates:
                - Path=/user-api/mtls/**
              filters:
                - StripPrefix=1

    routes:
      public-urls:
        - method: GET
          path: "/actuator/**"
      abac:
        - method: POST
          path: "/user-api/mtls/ephemeral-proof"
          disable-ephemeral-proof-check: true

authentication-provider:
  profile: participant
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 300Mi
  fullnameOverride: authn-provider
  db:
    url: "jdbc:postgresql://postgresql.iaa-dstest-data-provider.svc.cluster.local:5432/authenticationprovider"
    username: "authenticationprovider"
    password: "authenticationprovider"
    cipherSecret: "authenticationprovider-db-cipher-secret" # name of the secret key that will be generated used to encrypt keys  
  redis:
    host: "redis-master.iaa-dstest-data-provider.svc.cluster.local"
    port: "6379"
    username: "default"
    password: "admin" # update this

  keypair:
    signatureAlgorithm: "SHA256withECDSA"
    algorithm: "ECDSA"
    keyLength: 256

  microservices:
    usersRolesUrl: http://users-roles.iaa-dstest-data-provider.svc.cluster.local:8080

  simpl:
    certificate:
      san: t2.iaa-dstest-data-provider.dev.simpl-europe.eu

simpl-cli:
  initAuthority:
    enabled: false
  initParticipant:
    enabled: true
    ptype: DATA_PROVIDER
    hostT1: t1.{{ .Release.Namespace }}.dev.simpl-europe.eu
    authorityHostT1: t1.iaa-dstest-authority.dev.simpl-europe.eu
    csr:
      cn: t2.{{ .Release.Namespace }}.dev.simpl-europe.eu
      o: aruba-data-provider
      ou: aruba-data-provider-test
      country: IT
    keycloak:
      internalHost: keycloak.{{ .Release.Namespace }}.svc.cluster.local
      port: 80
      app:
        realm: participant
        clientId: cli
      master:
        user: user
        password: admin
      authority:
        user: admin
        password: admin
        realm: authority
    microservices:
      usersRolesUrl: https://{{ tpl .Values.initParticipant.hostT1 . }}/cli/userApi/v1/
      authenticationProviderUrl: https://{{ tpl .Values.initParticipant.hostT1 . }}/cli/authApi/v1/