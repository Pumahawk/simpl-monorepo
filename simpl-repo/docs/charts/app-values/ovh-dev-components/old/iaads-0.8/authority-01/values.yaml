
global:
  cors:
    allowOrigin: https://t1.iaads-authority-01.dev.simpl-europe.eu,https://fe.iaads-authority-01.dev.simpl-europe.eu,http://localhost:4202,http://localhost:3000
  hostBe: t1.iaads-authority-01.dev.simpl-europe.eu
  hostTls: t2.iaads-authority-01.dev.simpl-europe.eu
  ingress:
    issuer: dev-prod
  profile: authority
  keystore:
    password: "authority"

redis:
  fullnameOverride: redis
  replica:
    replicaCount: 1
    persistence:
      size: 1Gi
  master:
    persistence:
      size: 1Gi
  auth:
    password: "admin"

postgresql:
  fullnameOverride: postgresql
  primary:
    initdb:
      scripts:
        init.sql: |
          CREATE USER ejbca WITH PASSWORD 'ejbca2123' CREATEDB;
          CREATE DATABASE ejbca OWNER ejbca;
          CREATE USER keycloak WITH PASSWORD 'keycloak' CREATEDB;
          CREATE DATABASE keycloak OWNER keycloak;
          CREATE USER securityattributesprovider WITH PASSWORD 'securityattributesprovider' CREATEDB;
          CREATE DATABASE securityattributesprovider OWNER securityattributesprovider;
          CREATE USER onboarding WITH PASSWORD 'onboarding' CREATEDB;
          CREATE DATABASE onboarding OWNER onboarding;
          CREATE USER usersroles WITH PASSWORD 'usersroles' CREATEDB;
          CREATE DATABASE usersroles OWNER usersroles;
          CREATE USER identityprovider WITH PASSWORD 'identityprovider' CREATEDB;
          CREATE DATABASE identityprovider OWNER identityprovider;
          CREATE USER authenticationprovider WITH PASSWORD 'authenticationprovider' CREATEDB;
          CREATE DATABASE authenticationprovider OWNER authenticationprovider;
ejbca:
  hostname: &ejbca-hostname ejbca-community-helm.iaads-authority-01.svc.cluster.local
  fullnameOverride: ejbca-community-helm
  # I used as Authentication Code for cryptotokens "enter" 
  ejbca:
    useEphemeralH2Database: false
    env:
      HTTPSERVER_HOSTNAME: *ejbca-hostname
      TLS_SETUP_ENABLED: "true"
      DATABASE_JDBC_URL: jdbc:postgresql://postgresql.iaads-authority-01.svc.cluster.local:5432/ejbca
      DATABASE_USER: "ejbca"
      DATABASE_PASSWORD: "ejbca2123"
    
  nginx:
    host: *ejbca-hostname

  # The following allows to not use a NodePort and have multiple istances of EJBCA on the same cluster 
  services:
    directHttp:
      type: ClusterIP

### Keycloak Config
keycloak:
  fullnameOverride: keycloak
  apiUrl: "https://t1.iaads-authority-01.dev.simpl-europe.eu" # update
  extraEnvVars: 
    - name: KC_HOSTNAME_ADMIN
      value: "https://t1.iaads-authority-01.dev.simpl-europe.eu/auth" # update
    - name: KC_HOSTNAME
      value: "https://t1.iaads-authority-01.dev.simpl-europe.eu/auth" # update
    - name: USERS_ROLES_BASE_URL
      value: "http://users-roles.iaads-authority-01.svc.cluster.local:8080" # update
    - name: KEYCLOAK_BASE_URL
      value: "https://t1.iaads-authority-01.dev.simpl-europe.eu/auth" # update
    - name: REALM
      value: "authority" # update
    - name: KEYCLOAK_EXTRA_ARGS
      value: --import-realm

  auth:
    adminUser: "admin" # update
    adminPassword: "admin" # update

  postgresql:
    enabled: false

  externalDatabase:
    annotations: {}
    database: keycloak
    existingSecret: ""
    existingSecretDatabaseKey: ""
    existingSecretHostKey: ""
    existingSecretPasswordKey: ""
    existingSecretPortKey: ""
    existingSecretUserKey: ""
    host: "postgresql.iaads-authority-01.svc.cluster.local" # update
    password: keycloak
    port: 5432
    user: keycloak

  extraVolumes:
    - name: spi-volume
      emptyDir: {}
    - name: realm-volume
      emptyDir: {}

  extraVolumeMounts:
    - name: spi-volume
      mountPath: /opt/bitnami/keycloak/providers/keycloak-authenticator.jar
      subPath: keycloak-authenticator.jar
    - name: realm-volume
      mountPath: /opt/bitnami/keycloak/data/import/realm.json
      subPath: realm.json

  initContainers: 
    - name: init-spi
      image: curlimages/curl
      command: ["/bin/sh", "-c"]
      env:
        - name: ARTIFACT
          value: keycloak-authenticator
        - name: URL
          value: https://code.europa.eu/api/v4/projects/915/packages/maven/com/aruba/simpl/keycloak-authenticator/0.8.0/keycloak-authenticator-0.8.0.jar
      args:
        - |
          curl -o /custom-spi/${ARTIFACT}.jar ${URL};
      volumeMounts:
        - name: spi-volume
          mountPath: /custom-spi

    - name: import-realm
      image: curlimages/curl
      command: ["/bin/sh", "-c"]
      env:
        - name: REALM_NAME
          value: realm
        - name: URL
          # uncomment below if you are deploying an authority
          value: https://code.europa.eu/simpl/simpl-open/development/iaa/charts/-/raw/develop/samples/keycloak-realms/0.8.0/authority-realm-export.json?ref_type=heads
          # uncomment below if you are deploying a participant
          # value: https://code.europa.eu/simpl/simpl-open/development/iaa/charts/-/raw/develop/samples/keycloak-realms/0.8.0/participant-realm-export.json?ref_type=heads&inline=false
      args:
        - |
          curl -o /config/${REALM_NAME}.json ${URL};
      volumeMounts:
        - name: realm-volume
          mountPath: /config

simpl-cloud-gateway:
  ejbcaUrl: http://ejbca-community-helm.iaads-authority-01.svc.cluster.local:30080 # comment this line if profile is `participant`
  identityProviderUrl: http://identity-provider.iaads-authority-01.svc.cluster.local:8080 # comment this line if profile is `participant`
  keycloakUrl: http://keycloak.iaads-authority-01.svc.cluster.local
  onboardingUrl: http://onboarding.iaads-authority-01.svc.cluster.local:8080 # comment this line if profile is `participant`
  securityAttributesProviderUrl: http://security-attributes-provider.iaads-authority-01.svc.cluster.local:8080 # comment this line if profile is `participant`
  usersRolesUrl: http://users-roles.iaads-authority-01.svc.cluster.local:8080
  authenticationProviderUrl: http://authentication-provider.iaads-authority-01.svc.cluster.local:8080

 # Spring Cloud Gateway Routes Authority
  appConfig:
    spring:
      cloud:
        gateway:
          routes: 
            - id: keycloak
              uri: ${keycloak.url}
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            - id: users-roles
              uri: ${users-roles.url}
              predicates:
                - Path=/user-api/**
              filters:
                - StripPrefix=1
            - id: onboarding
              uri: ${onboarding.url}
              predicates:
                - Path=/onboarding-api/**
              filters:
                - StripPrefix=1
            - id: sap
              uri: ${sap.url}
              predicates:
                - Path=/sap-api/**
              filters:
                - StripPrefix=1
            - id: identity-provider
              uri: ${identity-provider.url}
              predicates:
                - Path=/identity-api/**
              filters:
                - StripPrefix=1
            - id: authentication-provider
              uri: ${authentication-provider.url}
              predicates:
                - Path=/auth-api/**
              filters:
                - StripPrefix=1
            - id: ocsp
              uri: ${ejbca.url}
              predicates:
                - Path=/ocsp
              filters:
                - RewritePath=/ocsp/*, /ejbca/publicweb/status/ocsp
            - id: ca-certificates
              uri: ${ejbca.url}
              predicates:
                - Path=/ca/*
              filters:
                - RewritePath=/ca/?(?<segment>.*), /ejbca/publicweb/webdist/certdist?cmd=cacert&issuer=CN%3D$\{segment}
            - id: crl
              uri: ${ejbca.url}
              predicates:
                - Path=/crl/*
              filters:
                - RewritePath=/crl/?(?<segment>.*), /ejbca/publicweb/webdist/certdist?cmd=crl&issuer=CN%3D$\{segment}

    springdoc:
      swagger-ui:
        urls:
          - url: /sap-api/v3/api-docs
            name: Security Attributes Provider Service
          - url: /onboarding-api/v3/api-docs
            name: Onboarding Service
          - url: /user-api/v3/api-docs
            name: Users & Roles Service
          - url: /identity-api/v3/api-docs
            name: Identity Provider Service
          - url: /auth-api/v3/api-docs
            name: Authentication Provider Service

    routes:
      public-urls:
        - method: GET
          path: "/swagger-ui.html"
        - method: GET
          path: "/swagger-ui/**"
        - method: GET
          path: "/v3/api-docs/**"
        - method: GET
          path: "/actuator/**"

        - method: POST
          path: "/ocsp"
        - method: GET
          path: "/ca/**"
        - method: GET
          path: "/crl/**"

        - method: GET
          path: "/user-api/credential/public-key" #TODO remove this

        - method: POST
          path: "/onboarding-api/onboarding-request"
        - method: GET
          path: "/onboarding-api/participant-type"

      denied-urls:
        - method: GET
          path: "/auth-api/keypair"

      rbac:
        ### CLI
        - path: "/identity-api/cli/*"
          roles:
            - NOTARY
            - T1UAR_M
        - path: "/sap-api/cli*"
          roles:
            - NOTARY
            - T1UAR_M
        - path: "/user-api/cli*"
          roles:
            - NOTARY
            - T1UAR_M
          ### ONBOARDING
        - path: "/onboarding-api/onboarding-request/*/status"
          roles:
            - NOTARY
        - path: "/onboarding-api/onboarding-request/*/document"
          method: POST
          roles:
            - NOTARY
        - path: "/onboarding-api/participant-type/*"
          roles:
            - T2IAA_M
        - path: "/onboarding-api/onboarding-status/*"
          roles:
            - T2IAA_M
        - path: "/onboarding-api/onboarding-template/*"
          roles:
            - T2IAA_M
        - path: "/onboarding-api/mime-type/*"
          roles:
            - T2IAA_M
        - path: "/onboarding-api/onboarding-request"
          method: GET
          roles:
            - APPLICANT
            - NOTARY
        - path: "/onboarding-api/onboarding-request"
          method: PATCH
          roles:
            - APPLICANT
            - NOTARY
        - path: "/onboarding-api/onboarding-request/*"
          method: GET
          roles:
            - APPLICANT
            - NOTARY
        - path: "/onboarding-api/onboarding-request/*/id-document"
          method: PATCH
          roles:
            - APPLICANT
            - NOTARY
        - path: "/onboarding-api/onboarding-request/*/document/*"
          method: GET
          roles:
            - APPLICANT
            - NOTARY
        - path: "/onboarding-api/onboarding-request/*/expiration-timeframe"
          method: PATCH
          roles:
            - NOTARY
          ###
        - path: "/identity-api/participant/*"
          method: PUT
          roles:
            - NOTARY
        - method: POST
          path: "/identity-api/csr/*"
          roles:
            - APPLICANT
        - path: "/user-api/agent/identity-attributes"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/agent/identity-attributes/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/identity-attribute/search"
          method: GET
          roles:
            - T1UAR_M
            - NOTARY
        - path: "/user-api/role/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/role"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/user-api/role/*/identity-attributes"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/role/delete-attribute"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/user-api/role/*"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/user-api/role/search"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/role/*/duplicate-identity-attribute"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/user/*"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/user/**"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/user/**"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/user-api/user/*"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/sap-api/identity-attribute"
          method: POST
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/*"
          method: GET
          roles:
            - IATTR_M
            - NOTARY
        - path: "/sap-api/identity-attribute/*"
          method: PUT
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/*"
          method: DELETE
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/assignable/*"
          method: PUT
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/add-participant-type/*"
          method: PUT
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/unassign-participant/*"
          method: DELETE
          roles:
            - NOTARY
            - IATTR_M
        - path: "/sap-api/identity-attribute/assign-participant/*"
          method: PUT
          roles:
            - NOTARY
            - IATTR_M
        - path: "/sap-api/identity-attribute/assign/*/*"
          method: PUT
          roles:
            - NOTARY
        - path: "/auth-api/keypair"
          method: HEAD
          roles:
            - ONBOARDER_M           
      logging:
        business:
          - method: POST
            path: /onboarding-api/onboarding-request
            config:
              operations:
                - ONBOARDING_REQUEST
          - method: POST
            path: /onboarding-api/onboarding-request/*/approve
            config:
              operations:
                - APPROVE_ONBOARDING_REQUEST
          - method: POST
            path: /onboarding-api/onboarding-request/*/reject
            config:
              operations:
                - REJECT_ONBOARDING_REQUEST


tls-gateway:
  keypair:
    algorithm: EC

  microservices:
    usersRolesUrl: http://users-roles.iaads-authority-01.svc.cluster.local:8080 
    keycloakUrl: http://keycloak.iaads-authority-01.svc.cluster.local
    securityAttributesProviderUrl: http://security-attributes-provider.iaads-authority-01.svc.cluster.local:8080
    identityProviderUrl: http://identity-provider.iaads-authority-01.svc.cluster.local:8080
    authenticationProviderUrl: http://authentication-provider.iaads-authority-01.svc.cluster.local:8080

  redis:
    host: "redis-master.iaads-authority-01.svc.cluster.local"
    port: "6379"
    username: "default"
    password: "admin"

  hostT2: "t2.iaads-authority-01.dev.simpl-europe.eu"
  appConfig:
    spring:
      cloud:
        gateway:
          routes:
          - id: sap
            uri: ${sap.url}
            predicates:
              - Path=/sap-api/mtls/**
            filters:
              - StripPrefix=1
          - id: identity-provider
            uri: ${identity-provider.url}
            predicates:
              - Path=/identity-api/mtls/**
            filters:
              - StripPrefix=1
          - id: users-roles
            uri: ${users-roles.url}
            predicates:
              - Path=/user-api/mtls/**
            filters:
              - StripPrefix=1
    routes:
      public-urls:
        - method: GET
          path: "/actuator/**"

      abac:
        - method: PATCH
          path: "/identity-api/mtls/public-key"
          disable-ephemeral-proof-check: true
        - method: POST
          path: "/identity-api/mtls/token"
          disable-ephemeral-proof-check: true
        - method: POST
          path: "/user-api/mtls/ephemeral-proof"
          disable-ephemeral-proof-check: true
      logging:
        business:
          - method: GET
            path: /user-api/mtls/ping
            config:
              operations:
                - PING_REQUEST
          - method: GET
            path: /identity-api/mtls/echo
            config:
              operations:
                - ECHO_REQUEST

security-attributes-provider:
  db:
    url: "jdbc:postgresql://postgresql.iaads-authority-01.svc.cluster.local:5432/securityattributesprovider"
    username: "securityattributesprovider"
    password: "securityattributesprovider"

  microservices:
    identityProviderUrl: http://identity-provider.iaads-authority-01.svc.cluster.local:8080
    onboardingUrl: http://onboarding.iaads-authority-01.svc.cluster.local:8080

  databaseSeeding:
    securityAttributeProviderMapping:
      # If you want to start with an empty identity attributes table, set this to false.
      enabled: true 

      # To specify your custom attributes, uncomment and provide the path to your JSON file here.
      # filePath: "file:/app/config/exampleIdentityAttributes.default.json" 

users-roles:
  db:
    url: "jdbc:postgresql://postgresql.iaads-authority-01.svc.cluster.local:5432/usersroles"
    username: "usersroles"
    password: "usersroles"

  redis:
    host: "redis-master.iaads-authority-01.svc.cluster.local"
    port: "6379"
    username: "default"
    password: "admin"

  keycloak:
    master:
      user: "admin"
      password: "admin"
    clientToRealmRoleMigration:
      enabled: true # set to true to import realm roles from client roles
      clientIds: "['frontend-cli']" # Add clients from which you want to copy the roles, separated by commas (e.g., frontend-cli,client-1,client-2).

  microservices:
    identityProviderUrl: http://identity-provider.iaads-authority-01.svc.cluster.local:8080
    authenticationProviderUrl: http://authentication-provider.iaads-authority-01.svc.cluster.local:8080

  databaseSeeding:
  roleIdentityAttributesMapping:
    # If you want to start with an empty identity attributes table, set this to false.
    # Ff enabled is set to true and filePath is commented or empty the table will be initialized with the default seeding file.
    enabled: true 

    # To specify your custom attributes, uncomment and provide the path to your JSON file here.
    # filePath must start with 'file:'
    # You can find an example of seeding file in samples/db-seeding/user-roles/0.8.x/roleAttributes.default.json
    # filePath: file:/app/config/exampleRoleAttributes.json 

onboarding:
  db:
    url: "jdbc:postgresql://postgresql.iaads-authority-01.svc.cluster.local:5432/onboarding"
    username: "onboarding"
    password: "onboarding"

  microservices:
    identityProviderUrl: http://identity-provider.iaads-authority-01.svc.cluster.local:8080
    usersRolesUrl: http://users-roles.iaads-authority-01.svc.cluster.local:8080

identity-provider:
