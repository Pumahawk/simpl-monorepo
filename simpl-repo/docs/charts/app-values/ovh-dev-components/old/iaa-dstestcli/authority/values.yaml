tls-gateway:
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 300Mi
  service:
    type: LoadBalancer
  useDeamonSet: false

  keypair:
    algorithm: EC

  microservices:
    usersRolesUrl: http://users-roles.iaa-dstestcli-authority.svc.cluster.local:8080
    keycloakUrl: http://iaa-dstestcli-authority-keycloak.iaa-dstestcli-authority.svc.cluster.local
    securityAttributesProviderUrl: http://security-attributes-provider.iaa-dstestcli-authority.svc.cluster.local:8080
    identityProviderUrl: http://identity-provider.iaa-dstestcli-authority.svc.cluster.local:8080
    authenticationProviderUrl: http://authentication-provider.iaa-dstestcli-authority.svc.cluster.local:8080

  redis:
    host: "iaa-dstestcli-authority-redis-master.iaa-dstestcli-authority.svc.cluster.local"
    port: "6379"
    username: "default"
    password: "admin"

  hostT2: "t2.iaa-dstestcli-authority.dev.simpl-europe.eu"
  appConfig:
    spring:
      cloud:
        gateway:
          routes:
          - id: sap
            uri: ${sap.url}
            predicates:
              - Path=/sap-api/mtls/**
            filters:
              - StripPrefix=1
          - id: identity-provider
            uri: ${identity-provider.url}
            predicates:
              - Path=/identity-api/mtls/**
            filters:
              - StripPrefix=1
          - id: users-roles
            uri: ${users-roles.url}
            predicates:
              - Path=/user-api/mtls/**
            filters:
              - StripPrefix=1
    routes:
      public-urls:
        - method: GET
          path: "/actuator/**"

      abac:
        - method: PATCH
          path: "/identity-api/mtls/public-key"
          disable-ephemeral-proof-check: true
        - method: POST
          path: "/identity-api/mtls/token"
          disable-ephemeral-proof-check: true
        - method: POST
          path: "/user-api/mtls/ephemeral-proof"
          disable-ephemeral-proof-check: true

simpl-cli:
  initAuthority:
    enabled: true
    hostT1: t1.{{ .Release.Namespace }}.dev.simpl-europe.eu
    csr:
      cn: t2.{{ .Release.Namespace }}.dev.simpl-europe.eu
      o: aruba
      ou: aruba-dev
      country: IT
    keycloak:
      app:
        realm: authority
        clientId: cli
      master:
        user: admin
        password: admin
    microservices:
      usersRolesUrl: https://{{ tpl .Values.initAuthority.hostT1 . }}/cli/userApi/v1/
      securityAttributesProviderUrl: https://{{ tpl .Values.initAuthority.hostT1 . }}/cli/sapApi/v1/
      identityProviderUrl: https://{{ tpl .Values.initAuthority.hostT1 . }}/cli/identityApi/v1/
      authenticationProviderUrl: https://{{ tpl .Values.initAuthority.hostT1 . }}/cli/authApi/v1/
  initParticipant:
    enabled: false