      cpu: 100m
      memory: 300Mi
  db:
    url: "jdbc:postgresql://iaa-dstestcli-authority-postgresql.iaa-dstestcli-authority.svc.cluster.local:5432/usersroles"
    username: "usersroles"
    password: "usersroles"
  keycloak:
    master:
      user: "admin"
      password: "admin"
    # clientToRealmRoleMigration:
    #   enabled: true # set to true to import realm roles from client roles
    #   clientIds: client-1,client-2 # clients from which you want to copy the roles, separated by comma.
  microservices:
    authenticationProviderUrl: http://authentication-provider.iaa-dstestcli-authority.svc.cluster.local:8080
