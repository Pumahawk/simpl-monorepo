apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iaa-dsstaging-authority
  namespace: argo-cd
  labels:
    owner: iaa
    scope: development
spec:
  project: iaa
  source:
    repoURL: https://code.europa.eu/simpl/simpl-open/development/iaa/charts.git
    targetRevision: feature/dev-agents
    path: app-values/ovh-dev-components/iaa-dsstaging/authority
    helm:
      releaseName: iaa-dsstaging-authority
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: iaa-dsstaging-authority
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
  info:
  - name: Participant Type
    value: GOVERNANCE AUTHORITY
