{{- $postgrest := .Values.postgrest | default dict }}
{{- if $postgrest.enabled | default false }}
{{- range $postgrest.databases | default list }}
apiVersion: v1
kind: Service
metadata:
  name: postgrest-{{ .name }}
spec:
  type: ClusterIP
  selector:
    app: postgrest-{{ .name }}
  ports:
    - port: 3000
      targetPort: 3000
---
{{- end }}
{{- end }}