          - url: /onboardingApi/openapi/onboarding-v1.yaml
            name: Onboarding Service V1
          - url: /userApi/openapi/usersroles-v1.yaml
            name: Users & Roles Service V1
          - url: /identityApi/openapi/identityprovider-v1.yaml
            name: Identity Provider Service V1
          - url: /authApi/openapi/authenticationprovider-v1.yaml
            name: Authentication Provider Service V1
          - url: /openapi/tier1gateway-v1.yaml
            name: Application Info V1
    
    keycloak:
      app:
        realm: authority
        
    microservices-info:
      microservices:
        - name: users-roles
          internalUrl: "http://users-roles.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
          detailUrl: "https://t1.{{ .Release.Namespace }}.dev.simpl-europe.eu/userApi/v1/"
        - name: sap
          internalUrl: "http://security-attributes-provider.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
          detailUrl: "https://t1.{{ .Release.Namespace }}.dev.simpl-europe.eu/sapApi/v1/"
        - name: identity-provider
          internalUrl: "http://identity-provider.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
          detailUrl: "https://t1.{{ .Release.Namespace }}.dev.simpl-europe.eu/identityApi/v1/"
        - name: onboarding
          internalUrl: "http://onboarding.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
          detailUrl: "https://t1.{{ .Release.Namespace }}.dev.simpl-europe.eu/onboardingApi/v1/"
        - name: authentication-provider
          internalUrl: "http://authentication-provider.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
          detailUrl: "https://t1.{{ .Release.Namespace }}.dev.simpl-europe.eu/authApi/v1/"

