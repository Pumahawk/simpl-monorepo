redis:
  image:
    repository: bitnamilegacy/redis
  kubectl:
    image:
      repository: bitnamilegacy/kubectl
  security:
    allowInsecureImages: true
  fullnameOverride: redis
  architecture: standalone
  auth:
    password: "admin"
  master:
    revisionHistoryLimit: 2
    persistence:
      size: 1Gi

postgresql:
  image:
    repository: bitnamilegacy/postgresql
  security:
    allowInsecureImages: true
  fullnameOverride: postgresql
  architecture: standalone
  primary:
    persistence:
      size: 1Gi
    initdb:
      scripts:
        init.sql: |
          CREATE USER ejbca WITH PASSWORD 'ejbca2123' CREATEDB;
          CREATE DATABASE ejbca OWNER ejbca;
          CREATE USER keycloak WITH PASSWORD 'keycloak' CREATEDB;
          CREATE DATABASE keycloak OWNER keycloak;
          CREATE USER securityattributesprovider WITH PASSWORD 'securityattributesprovider' CREATEDB;
          CREATE DATABASE securityattributesprovider OWNER securityattributesprovider;
          CREATE USER onboarding WITH PASSWORD 'onboarding' CREATEDB;
          CREATE DATABASE onboarding OWNER onboarding;
          CREATE USER usersroles WITH PASSWORD 'usersroles' CREATEDB;
          CREATE DATABASE usersroles OWNER usersroles;
          CREATE USER identityprovider WITH PASSWORD 'identityprovider' CREATEDB;
          CREATE DATABASE identityprovider OWNER identityprovider;
          CREATE USER authenticationprovider WITH PASSWORD 'authenticationprovider' CREATEDB;
          CREATE DATABASE authenticationprovider OWNER authenticationprovider;

keycloak:
  global:
    security:
      allowInsecureImages: true
  image:
    repository: keycloak/keycloak
    tag: 26.4
  fullnameOverride: keycloak
  defaultInitContainers:
    prepareWriteDirs:
      enabled: false
  args:
    - start
    - --import-realm
    - --verbose
    - --proxy-headers
    - xforwarded
  containerSecurityContext:
    runAsUser: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
  resources:
    limits:
      cpu: 750m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  apiUrl: "https://t1.{{ .Release.Namespace }}.dev.simpl-europe.eu"
  extraEnvVars:
    - name: KC_HOSTNAME_ADMIN
      value: "{{ tpl .Values.apiUrl . }}/auth"
    - name: KC_HOSTNAME
      value: "{{ tpl .Values.apiUrl . }}/auth"
    - name: USERS_ROLES_BASE_URL
      value: "http://users-roles.{{ .Release.Namespace }}.svc.cluster.local:8080"
    - name: AUTHENTICATION_PROVIDER_BASE_URL
      value: "http://authentication-provider.{{ .Release.Namespace }}.svc.cluster.local:8080"
    - name: KEYCLOAK_BASE_URL
      value: "{{ tpl .Values.apiUrl . }}/auth"
    - name: REALM
      value: "authority" # update
    - name: KEYCLOAK_ADMIN
      value: "admin"
    - name: KEYCLOAK_ADMIN_PASSWORD
      value: "admin"
    - name: KC_DB
      value: "postgres"
    - name: KC_DB_URL_HOST
      value: "postgresql.{{ .Release.Namespace }}.svc.cluster.local"
    - name: KC_DB_URL_PORT
      value: "5432"
    - name: KC_DB_URL_DATABASE
      value: "keycloak"
    - name: KC_DB_USERNAME
      value: "keycloak"
    - name: KC_DB_PASSWORD
      value: "keycloak"
    - name: KC_BOOTSTRAP_ADMIN_USERNAME
      value: "admin"
    - name: KC_BOOTSTRAP_ADMIN_PASSWORD
      value: "admin"
  # auth:
  #   adminUser: "admin" # update
  #   adminPassword: "admin" # update
  postgresql:
    enabled: false
  externalDatabase:
    annotations: {}
    database: keycloak
    existingSecret: ""
    existingSecretDatabaseKey: ""
    existingSecretHostKey: ""
    existingSecretPasswordKey: ""
    existingSecretPortKey: ""
    existingSecretUserKey: ""
    host: "postgresql.{{ .Release.Namespace }}.svc.cluster.local"
    password: keycloak
    port: 5432
    user: keycloak
  extraVolumes:
    - name: spi-volume
      emptyDir: {}
    - name: realm-volume
      emptyDir: {}
  extraVolumeMounts:
    - name: spi-volume
      mountPath: /opt/keycloak/providers
    - name: realm-volume
      mountPath: /opt/keycloak/data/import/realm.json
      subPath: realm.json
  initContainers:
    # - name: setup-container
    #   image: alpine:latest
    #   command:
    #     - /bin/sh
    #   args:
    #     - -ec
    #     - |
    #       echo "Copying writable dirs to empty dir"
    #       # In order to not break the application functionality we need to make some
    #       # directories writable, so we need to copy it to an empty dir volume
    #       mkdir /emptydir/app-quarkus-dir
    #       mkdir /emptydir/app-data-dir
    #       mkdir /emptydir/app-providers-dir
    #       mkdir /emptydir/app-themes-dir

    #       echo "Copy operation completed"
    #   volumeMounts:
    #     - name: empty-dir
    #       mountPath: /emptydir
    - name: init-spi
      image: curlimages/curl
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
      command: ["/bin/sh", "-c"]
      env:
        - name: ARTIFACT
          value: keycloak-authenticator
        - name: URL
          value: https://code.europa.eu/api/v4/projects/915/packages/maven/com/aruba/simpl/keycloak-authenticator/2.0.0/keycloak-authenticator-2.0.0.jar
        - name: EIDAS_EXTENSION_ARTIFACT
          value: keycloak-eidas-demo-authenticator
        - name: EIDAS_EXTENSION_URL
          value: https://code.europa.eu/api/v4/projects/1313/packages/maven/eu/europa/ec/simpl/eidas-demo-keycloak-extension/0.1.0/eidas-demo-keycloak-extension-0.1.0.jar
      args:
        - |
          curl -o /custom-spi/${ARTIFACT}.jar ${URL};
          curl -o /custom-spi/${EIDAS_EXTENSION_ARTIFACT}.jar ${EIDAS_EXTENSION_URL};
      volumeMounts:
        - name: spi-volume
          mountPath: /custom-spi
    - name: import-realm
      image: nginx:latest
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
      command: ["/bin/sh", "-c"]
      env:
        - name: REDIRECT_URIS
          value: |-
            [ "*" ]
        - name: REALM_NAME
          value: realm
        - name: URL
          # uncomment below if you are deploying an authority
          value: https://code.europa.eu/simpl/simpl-open/development/iaa/charts/-/raw/feature/paramsin-realm-export/samples/keycloak-realms/1.0.0/authority-realm-export.json?ref_type=heads
          # uncomment below if you are deploying a participant
          # value: https://code.europa.eu/simpl/simpl-open/development/iaa/charts/-/raw/develop/samples/keycloak-realms/1.0.0/participant-realm-export.json?ref_type=heads
      args:
        - |
          curl ${URL} | envsubst '$REDIRECT_URIS' > /config/${REALM_NAME}.json;
      volumeMounts:
        - name: realm-volume
          mountPath: /config

onboarding:
  devMode: true
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 300Mi

  kafkaConfig:
    spring:
      kafka:
        bootstrap-servers: kafka.iaacommon.svc.cluster.local:9092
        producer:
          properties:
            security.protocol: SASL_PLAINTEXT
            sasl.mechanism: PLAIN
            sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="iaaauthority_onboarding" password="XGEc4V6BQqKb5fwP";
        admin:
          auto-create: true
    simpl:
      kafka:
        topic:
          prefix: iaa.{{ .Release.Namespace }}.
  
  appConfig:
    eidas:
      enabled: true
    email-service:
      onboarding-request-url:
        applicant-url-template: https://fe.{{ .Release.Namespace }}.dev.simpl-europe.eu/onboarding/application/additional-request
        notary-url-template: https://fe.{{ .Release.Namespace }}.dev.simpl-europe.eu/onboarding/administration/{id}

