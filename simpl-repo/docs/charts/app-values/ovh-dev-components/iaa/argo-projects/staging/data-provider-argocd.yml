apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iaa-dsstaging-data-provider
  namespace: argo-cd
  labels:
    owner: iaa
    scope: development
spec:
  project: iaa
  source:
    repoURL: https://code.europa.eu/simpl/simpl-open/development/iaa/charts.git
    targetRevision: feature/iaa-dsstaging
    path: app-values/ovh-dev-components/iaa/data-provider
    helm:
      releaseName: iaa-dsstaging-data-provider
      valueFiles:
        - values.yaml
        - values-automation.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: iaa-dsstaging-data-provider
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
    - CreateNamespace=true
  info:
  - name: Participant Type
    value: DATA PROVIDER
