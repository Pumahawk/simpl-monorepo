tier2-gateway:
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 300Mi
  profile: authority
  keypair:
    algorithm: EC

  microservices:
    usersRolesUrl: http://users-roles.iaa-authority-latestint.svc.cluster.local:8080 
    keycloakUrl: http://keycloak.iaa-authority-latestint.svc.cluster.local
    securityAttributesProviderUrl: http://security-attributes-provider.iaa-authority-latestint.svc.cluster.local:8080
    identityProviderUrl: http://identity-provider.iaa-authority-latestint.svc.cluster.local:8080
    authenticationProviderUrl: http://authentication-provider.iaa-authority-latestint.svc.cluster.local:8080

  redis:
    host: "redis-master.{{ .Release.Namespace }}.svc.cluster.local"
    port: "6379"
    username: "default"
    password: "admin"

  hostT2: "t2.iaa-authority-latestint.dev.simpl-europe.eu"

  kafkaConfig:
    spring:
      kafka:
        bootstrap-servers: kafka.common-agent.svc.cluster.local:9092
        consumer:
          properties:
            security.protocol: SASL_PLAINTEXT
            sasl.mechanism: PLAIN
            sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_USER:iaa}" password="${KAFKA_PASSWORD:eezooS4Aideth1teaDeey3ohghohwohk}";
        admin:
          auto-create: true
    simpl:
      kafka:
        topic:
          prefix: iaa.{{ .Release.Namespace }}.
    

  appConfig:
    spring:
      cloud:
        gateway:
          routes:
          - id: sap
            uri: ${sap.url}
            predicates:
              - Path=/sap-api/mtls/**
            filters:
              - StripPrefix=1
          - id: sap-v1
            uri: ${sap.url}
            predicates:
              - Path=/sapApi/v1/mtls/**
            filters:
              - StripPrefix=1
          - id: identity-provider
            uri: ${identity-provider.url}
            predicates:
              - Path=/identity-api/mtls/**
            filters:
              - StripPrefix=1
          - id: identity-provider-v1
            uri: ${identity-provider.url}
            predicates:
              - Path=/identityApi/v1/mtls/**
            filters:
              - StripPrefix=1
          - id: identity-provider-v1-tmp
            uri: ${identity-provider.url}
            predicates:
              - Path=/identity-api/v1/mtls/**
            filters:
              - StripPrefix=1
          - id: users-roles
            uri: ${users-roles.url}
            predicates:
              - Path=/user-api/mtls/**
            filters:
              - StripPrefix=1
          - id: users-roles-v1
            uri: ${users-roles.url}
            predicates:
              - Path=/userApi/v1/mtls/**
            filters:
              - StripPrefix=1
    routes:
      public-urls:
        - method: GET
          path: "/actuator/**"

      abac:
        - method: PATCH
          path: "/identity-api/mtls/public-key"
          disable-ephemeral-proof-check: true
        - method: POST
          path: "/identity-api/mtls/token"
          disable-ephemeral-proof-check: true
        - method: GET
          path: "/identity-api/v1/mtls/whoami"
          disable-ephemeral-proof-check: true
        - method: POST
          path: "/user-api/mtls/ephemeral-proof"
          disable-ephemeral-proof-check: true
        - method: PATCH
          path: "/identityApi/v1/mtls/publicKey"
          disable-ephemeral-proof-check: true
        - method: POST
          path: "/identityApi/v1/mtls/token"
          disable-ephemeral-proof-check: true
        - method: GET
          path: "/identityApi/v1/mtls/whoami"
          disable-ephemeral-proof-check: true
        - method: POST
          path: "/userApi/v1/mtls/ephemeralProof"
          disable-ephemeral-proof-check: true
      logging:
        business:
          - method: GET
            path: /user-api/mtls/ping
            config:
              operations:
                - PING_REQUEST
          - method: GET
            path: /identity-api/mtls/echo
            config:
              operations:
                - ECHO_REQUEST

