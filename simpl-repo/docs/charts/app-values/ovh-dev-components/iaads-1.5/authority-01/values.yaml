users-roles:
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 300Mi
  hostT1: t1.iaa-authority-latestint.dev.simpl-europe.eu
  authorityHostT2: t2.iaa-authority-latestint.dev.simpl-europe.eu

  db:
    url: "jdbc:postgresql://postgresql.iaa-authority-latestint.svc.cluster.local:5432/usersroles"
    username: "usersroles"
    password: "usersroles"

  redis:
    host: "redis-master.iaa-authority-latestint.svc.cluster.local"
    port: "6379"
    username: "default"
    password: "admin"

  keycloak:
    master:
      user: "admin"
      password: "admin"
      realm: authority
    clientToRealmRoleMigration:
      enabled: true # set to true to import realm roles from client roles
      clientIds: "['frontend-cli']" # Add clients from which you want to copy the roles, separated by commas (e.g., frontend-cli,client-1,client-2).

  microservices:
    identityProviderUrl: http://identity-provider.iaa-authority-latestint.svc.cluster.local:8080
    authenticationProviderUrl: http://authentication-provider.iaa-authority-latestint.svc.cluster.local:8080

  databaseSeeding:
    roleIdentityAttributesMapping:
      # If you want to start with an empty identity attributes table, set this to false.
      # if enabled is set to true and filePath is commented or empty the table will be initialized with the default seeding file.
      enabled: true 

      # To specify your custom attributes, uncomment and provide the path to your JSON file here.
      # filePath must start with 'file:'
      # You can find an example of seeding file in samples/db-seeding/user-roles/0.8.x/roleAttributes.default.json
      # filePath: file:/app/config/exampleRoleAttributes.json 
  kafkaConfig:
    spring:
      kafka:
        bootstrap-servers: kafka.common-agent.svc.cluster.local:9092
        consumer:
          group-id: iaa.{{ .Release.Namespace }}.users-roles
          properties:
            security.protocol: SASL_PLAINTEXT
            sasl.mechanism: PLAIN
            sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_USER:iaa}" password="${KAFKA_PASSWORD:eezooS4Aideth1teaDeey3ohghohwohk}";
        admin:
          auto-create: true
    simpl:
      kafka:
        topic:
          prefix: iaa.{{ .Release.Namespace }}.
        inbox:
          topic:
            pattern: iaa\.{{ .Release.Namespace }}\..*


