redis:
  fullnameOverride: redis
  replica:
    replicaCount: 0
    persistence:
      size: 1Gi
  master:
    persistence:
      size: 1Gi
  auth:
    password: "admin"

postgresql:
  fullnameOverride: postgresql
  primary:
    initdb:
      scripts:
        init.sql: |
          CREATE USER ejbca WITH PASSWORD 'ejbca2123' CREATEDB;
          CREATE DATABASE ejbca OWNER ejbca;
          CREATE USER keycloak WITH PASSWORD 'keycloak' CREATEDB;
          CREATE DATABASE keycloak OWNER keycloak;
          CREATE USER securityattributesprovider WITH PASSWORD 'securityattributesprovider' CREATEDB;
          CREATE DATABASE securityattributesprovider OWNER securityattributesprovider;
          CREATE USER onboarding WITH PASSWORD 'onboarding' CREATEDB;
          CREATE DATABASE onboarding OWNER onboarding;
          CREATE USER usersroles WITH PASSWORD 'usersroles' CREATEDB;
          CREATE DATABASE usersroles OWNER usersroles;
          CREATE USER identityprovider WITH PASSWORD 'identityprovider' CREATEDB;
          CREATE DATABASE identityprovider OWNER identityprovider;
          CREATE USER authenticationprovider WITH PASSWORD 'authenticationprovider' CREATEDB;
          CREATE DATABASE authenticationprovider OWNER authenticationprovider;
ejbca:
  hostname: &ejbca-hostname ejbca-community-helm.iaa-authority-latestint.svc.cluster.local
  fullnameOverride: ejbca-community-helm
  # I used as Authentication Code for cryptotokens "enter" 
  serviceAccount:
    name: ejbca-init-sa # see templates/secret-manager-role.yaml
  image:
    tag: 8.2.0.1
  ejbca:
    useEphemeralH2Database: false
    env:
      HTTPSERVER_HOSTNAME: *ejbca-hostname # update namespace
      TLS_SETUP_ENABLED: "true"
      DATABASE_JDBC_URL: &ejbca-db-url jdbc:postgresql://postgresql.iaa-authority-latestint.svc.cluster.local:5432/ejbca # update namespace
      DATABASE_USER: &ejbca-db-user ejbca
      DATABASE_PASSWORD: &ejbca-db-password ejbca2123

    initContainers:
    - name: ejbca-init
      image: code.europa.eu:4567/simpl/simpl-open/development/iaa/ejbca-preconfig:1.0.0
      imagePullPolicy: IfNotPresent
      securityContext: {}
      env:
      - name: HTTPSERVER_HOSTNAME
        value: *ejbca-hostname
      - name: MANAGEMENT_END_ENTITY_USERNAME
        value: SuperAdmin
      - name: MANAGEMENT_END_ENTITY_PASSWORD
        value: password # update password
      - name: DATABASE_JDBC_URL
        value: *ejbca-db-url
      - name: DATABASE_USER
        value: *ejbca-db-user
      - name: DATABASE_PASSWORD
        value: *ejbca-db-password
      - name: T1_GATEWAY
        value: t1.iaa-authority-latestint.dev.simpl-europe.eu # update namespace
      - name: NAMESPACE
        value: iaa-authority-latestint # update namespace
      command:
      - "./entrypoint.sh"

  nginx:
    host: *ejbca-hostname

  # The following allows to not use a NodePort and have multiple istances of EJBCA on the same cluster 
  services:
    directHttp:
      type: ClusterIP

### Keycloak Config
keycloak:
  resources:
    limits:
      cpu: 750m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi
  fullnameOverride: keycloak
  apiUrl: "https://t1.iaa-authority-latestint.dev.simpl-europe.eu" # update
  extraEnvVars: 
    - name: KC_HOSTNAME_ADMIN
      value: "https://t1.iaa-authority-latestint.dev.simpl-europe.eu/auth" # update
    - name: KC_HOSTNAME
      value: "https://t1.iaa-authority-latestint.dev.simpl-europe.eu/auth" # update
    - name: USERS_ROLES_BASE_URL
      value: "http://users-roles.iaa-authority-latestint.svc.cluster.local:8080" # update
    - name: KEYCLOAK_BASE_URL
      value: "https://t1.iaa-authority-latestint.dev.simpl-europe.eu/auth" # update
    - name: REALM
      value: "authority" # update
    - name: KEYCLOAK_EXTRA_ARGS
      value: --import-realm

  auth:
    adminUser: "admin" # update
    adminPassword: "admin" # update

  postgresql:
    enabled: false

  externalDatabase:
    annotations: {}
    database: keycloak
    existingSecret: ""
    existingSecretDatabaseKey: ""
    existingSecretHostKey: ""
    existingSecretPasswordKey: ""
    existingSecretPortKey: ""
    existingSecretUserKey: ""
    host: "postgresql.iaa-authority-latestint.svc.cluster.local" # update
    password: keycloak
    port: 5432
    user: keycloak

  extraVolumes:
    - name: spi-volume
      emptyDir: {}
    - name: realm-volume
      emptyDir: {}

  extraVolumeMounts:
    - name: spi-volume
      mountPath: /opt/bitnami/keycloak/providers/keycloak-authenticator.jar
      subPath: keycloak-authenticator.jar
    - name: realm-volume
      mountPath: /opt/bitnami/keycloak/data/import/realm.json
      subPath: realm.json

  initContainers: 
    - name: init-spi
      image: curlimages/curl
      command: ["/bin/sh", "-c"]
      env:
        - name: ARTIFACT
          value: keycloak-authenticator
        - name: URL
          value: https://code.europa.eu/api/v4/projects/915/packages/maven/com/aruba/simpl/keycloak-authenticator/1.0.0/keycloak-authenticator-1.0.0.jar
      args:
        - |
          curl -o /custom-spi/${ARTIFACT}.jar ${URL};
      volumeMounts:
        - name: spi-volume
          mountPath: /custom-spi

    - name: import-realm
      image: curlimages/curl
      command: ["/bin/sh", "-c"]
      env:
        - name: REALM_NAME
          value: realm
        - name: URL
          # uncomment below if you are deploying an authority
          value: https://code.europa.eu/simpl/simpl-open/development/iaa/charts/-/raw/develop/samples/keycloak-realms/1.0.0/authority-realm-export.json?ref_type=heads
          # uncomment below if you are deploying a participant
          # value: https://code.europa.eu/simpl/simpl-open/development/iaa/charts/-/raw/develop/samples/keycloak-realms/0.8.0/participant-realm-export.json?ref_type=heads&inline=false
      args:
        - |
          curl -o /config/${REALM_NAME}.json ${URL};
      volumeMounts:
        - name: realm-volume
          mountPath: /config

tier1-gateway:
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 300Mi
  hostT1: t1.iaa-authority-latestint.dev.simpl-europe.eu #your t1 host
  profile: authority
  ingress:
    issuer: dev-prod-dns01
  cors: 
    allowOrigin: https://t1.iaa-authority-latestint.dev.simpl-europe.eu,https://fe.iaa-authority-latestint.dev.simpl-europe.eu,http://localhost:4202,http://localhost:4203,http://localhost:3000
  ejbcaUrl: http://ejbca-community-helm.iaa-authority-latestint.svc.cluster.local:30080 # comment this line if profile is `participant`
  identityProviderUrl: http://identity-provider.iaa-authority-latestint.svc.cluster.local:8080 # comment this line if profile is `participant`
  keycloakUrl: http://keycloak.iaa-authority-latestint.svc.cluster.local
  onboardingUrl: http://onboarding.iaa-authority-latestint.svc.cluster.local:8080 # comment this line if profile is `participant`
  securityAttributesProviderUrl: http://security-attributes-provider.iaa-authority-latestint.svc.cluster.local:8080 # comment this line if profile is `participant`
  usersRolesUrl: http://users-roles.iaa-authority-latestint.svc.cluster.local:8080
  authenticationProviderUrl: http://authentication-provider.iaa-authority-latestint.svc.cluster.local:8080

  # Spring Cloud Gateway Routes Authority
  appConfig:
    spring:
      cloud:
        gateway:
          routes:
            - id: keycloak
              uri: ${keycloak.url}
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            - id: users-roles
              uri: ${users-roles.url}
              predicates:
                - Path=/user-api/**
              filters:
                - StripPrefix=1
            - id: users-rolesV1
              uri: ${users-roles.url}
              predicates:
                - Path=/userApi/**
              filters:
                - StripPrefix=1
            - id: onboarding-redirect-0
              uri: ${onboarding.url}
              predicates:
                - Path=/onboarding-api/onboarding-template/*
              filters:
                - name: RewritePath
                  args:
                    regexp: "/onboarding-api/onboarding-template/(?<segment>.*)"
                    replacement: "/v1/onboardingProcedureTemplates/$\\{segment}"
            - id: onboarding-redirect-1
              uri: ${onboarding.url}
              predicates:
                - Path=/onboarding-api/onboarding-template
              filters:
                - name: RewritePath
                  args:
                    regexp: "/onboarding-api/onboarding-templates"
                    replacement: "/v1/onboardingProcedureTemplates"
            - id: onboarding-redirect-2
              uri: ${onboarding.url}
              predicates:
                - Path=/onboarding-api/onboarding-request
              filters:
                - name: RewritePath
                  args:
                    regexp: "/onboarding-api/onboarding-request"
                    replacement: "/v1/onboardingRequests"            
            - id: onboarding
              uri: ${onboarding.url}
              predicates:
                - Path=/onboarding-api/**
              filters:
                - StripPrefix=1
            - id: onboardingV1
              uri: ${onboarding.url}
              predicates:
                - Path=/onboardingApi/**
              filters:
                - StripPrefix=1
            - id: sap
              uri: ${sap.url}
              predicates:
                - Path=/sap-api/**
              filters:
                - StripPrefix=1
            - id: sapV1
              uri: ${sap.url}
              predicates:
                - Path=/sapApi/**
              filters:
                - StripPrefix=1
            - id: identity-provider
              uri: ${identity-provider.url}
              predicates:
                - Path=/identity-api/**
              filters:
                - StripPrefix=1
            - id: identity-providerV1
              uri: ${identity-provider.url}
              predicates:
                - Path=/identityApi/**
              filters:
                - StripPrefix=1
            - id: authentication-provider
              uri: ${authentication-provider.url}
              predicates:
                - Path=/auth-api/**
              filters:
                - StripPrefix=1
            - id: authentication-providerV1
              uri: ${authentication-provider.url}
              predicates:
                - Path=/authApi/**
              filters:
                - StripPrefix=1
            - id: ocsp
              uri: ${ejbca.url}
              predicates:
                - Path=/ocsp
              filters:
                - RewritePath=/ocsp/*, /ejbca/publicweb/status/ocsp
            - id: ca-certificates
              uri: ${ejbca.url}
              predicates:
                - Path=/ca/*
              filters:
                - RewritePath=/ca/?(?<segment>.*), /ejbca/publicweb/webdist/certdist?cmd=cacert&issuer=CN%3D$\{segment}
            - id: crl
              uri: ${ejbca.url}
              predicates:
                - Path=/crl/*
              filters:
                - RewritePath=/crl/?(?<segment>.*), /ejbca/publicweb/webdist/certdist?cmd=crl&issuer=CN%3D$\{segment}
    
            # CLI configurations
            - id: cli-authentication-providerV1
              uri: ${authentication-provider.url}
              predicates:
                - Path=
                  /cli/authApi/v1/csr/generate,
                  /cli/authApi/v1/keypairs/generate,
                  /cli/authApi/v1/keypairs,
                  /cli/authApi/v1/credentials,
                  /cli/authApi/v1/credentials/download,
                  /cli/authApi/v1/agent/ping
              filters:
                - StripPrefix=2
                - name: ClientCredentialsFilter
                  args:
                    # Here you specify the clientid and the required client role to invoke this api
                    # in the following order: 
                    # client-id-name: client-role-1, client-role-1
                    # The default configuration is shown below.
                    cli: cli-role

            - id: cli-identity-providerV1
              uri: ${identity-provider.url}
              predicates:
                - Path=
                  /cli/identityApi/v1/participants/*/csr,
                  /cli/identityApi/v1/participants,
                  /cli/identityApi/v1/participants/authorityExists,
                  /cli/identityApi/v1/credentials/*/download
              filters:
                - StripPrefix=2
                - name: ClientCredentialsFilter
                  args:
                    # Here you specify the clientid and the required client role to invoke this api
                    # in the following order: 
                    # client-id-name: client-role-1, client-role-1
                    # The default configuration is shown below.
                    cli: cli-role

            - id: cli-security-attributes-providerV1
              uri: ${sap.url}
              predicates:
                - Path=
                  /cli/sapApi/v1/identityAttributes/import,
                  /cli/sapApi/v1/identityAttributes/addParticipantType/*
              filters:
                - StripPrefix=2
                - name: ClientCredentialsFilter
                  args:
                    # Here you specify the clientid and the required client role to invoke this api
                    # in the following order: 
                    # client-id-name: client-role-1, client-role-1
                    # The default configuration is shown below.
                    cli: cli-role

            - id: cli-users-and-rolesV1
              uri: ${users-roles.url}
              predicates:
                - Path=
                  /cli/userApi/v1/users/import,
                  /cli/userApi/v1/roles/import,
                  /cli/userApi/v1/roles/*/identityAttributes
              filters:
                - StripPrefix=2
                - name: ClientCredentialsFilter
                  args:
                    # Here you specify the clientid and the required client role to invoke this api
                    # in the following order: 
                    # client-id-name: client-role-1, client-role-1
                    # The default configuration is shown below.
                    cli: cli-role
      
    springdoc:
      swagger-ui:
        urls:
          - url: /v3/api-docs
            name: Tier 1 Gateway
          - url: /sapApi/v3/api-docs
            name: Security Attributes Provider Service
          - url: /onboardingApi/v3/api-docs
            name: Onboarding Service
          - url: /userApi/v3/api-docs
            name: Users & Roles Service
          - url: /identityApi/v3/api-docs
            name: Identity Provider Service
          - url: /authApi/v3/api-docs
            name: Authentication Provider Service
    
    keycloak:
      app:
        realm: authority
    
    routes: 
      public-urls:
        - method: GET
          path: "/swagger-ui.html"
        - method: GET
          path: "/swagger-ui/**"
        - method: GET
          path: "/v3/api-docs/**"
        - method: GET
          path: "/actuator/health/**"
        - method: GET
          path: "/actuator/info/**"
    
        - method: POST
          path: "/ocsp"
        - method: GET
          path: "/ca/**"
        - method: GET
          path: "/crl/**"
    
        - method: GET
          path: "/user-api/credential/public-key"
        - method: GET
          path: "/authApi/v1/credentials" 


        - method: GET
          path: /onboardingApi/v1/participantTypes
        - method: POST
          path: /onboardingApi/v1/onboardingRequests
    
        - method: GET
          path: /userApi/v1/info/version
        - method: GET
          path: /sapApi/v1/info/version
        - method: GET
          path: /identityApi/v1/info/version
        - method: GET
          path: /onboardingApi/v1/info/version
        - method: GET
          path: /authApi/v1/info/version
      
      denied-urls:
        - method: GET
          path: "/auth-api/keypair"
        - method: GET
          path: "/authApi/v1/keypairs"

        - path: "/sap-api/mtls/**"
        - path: "/user-api/mtls/**"
        - path: "/identity-api/mtls/**"
        - path: "/auth-api/mtls/**"
        - path: "/sapApi/v1/mtls/**"
        - path: "/userApi/v1/mtls/**"
        - path: "/identityApi/v1/mtls/**"
        - path: "/authApi/v1/mtls/**"

      rbac:
        ### onboarding
        - path: "/onboardingApi/v1/onboardingRequests/*/documents"
          method: POST
          roles:
            - NOTARY
        - path: "/onboardingApi/v1/onboardingStatus/*"
          roles:
            - T2IAA_M
        - path: "/onboardingApi/v1/mimeTypes/*"
          roles:
            - T2IAA_M
        - path: "/onboardingApi/v1/mimeTypes"
          roles:
            - T2IAA_M
            - NOTARY
        - path: "/onboardingApi/v1/onboardingRequests"
          method: GET
          roles:
            - APPLICANT
            - NOTARY
            - T2IAA_M
        - path: "/onboardingApi/v1/onboardingRequests"
          method: POST
          roles:
            - APPLICANT
            - NOTARY
        - path: "/onboardingApi/v1/onboardingRequests"
          method: PATCH
          roles:
            - APPLICANT
            - NOTARY
        - path: "/onboardingApi/v1/onboardingRequests/*"
          method: GET
          roles:
            - APPLICANT
            - NOTARY
        - path: "/onboardingApi/v1/onboardingRequests/*/documents/*"
          method: GET
          roles:
            - APPLICANT
            - NOTARY
        - path: "/onboardingApi/v1/onboardingRequests/*/expirationTimeframe"
          method: PATCH
          roles:
            - NOTARY
        - path: /onboarding-api/v1/onboardingRequests/*/evaluateFaultRules
          method: POST
          roles:
            - NOTARY
        - path: /onboardingApi/v1/onboardingRequests/*/evaluateFaultRules
          method: POST
          roles:
            - NOTARY
        - path: /onboardingApi/v1/onboardingRequests/*/identityAttributes
          method: GET
          roles:
            - NOTARY
        - path: /onboardingApi/v1/onboardingRequests/*/identityAttributes
          method: PUT
          roles:
            - NOTARY
        
        - path: /onboardingApi/v1/onboardingProcedureTemplates/*/validationRules
          method: POST
          roles:
            - T2IAA_M
        - path: /onboardingApi/v1/onboardingProcedureTemplates/*/validationRules
          method: GET
          roles:
            - T2IAA_M
        - path: /onboardingApi/v1/onboardingProcedureTemplates/*/validationRules/*
          method: GET
          roles:
            - T2IAA_M
        - path: /onboardingApi/v1/onboardingProcedureTemplates/*/validationRules/*
          method: PUT
          roles:
            - T2IAA_M
        - path: /onboardingApi/v1/onboardingProcedureTemplates/*/identityAttributes
          method: GET
          roles:
            - T2IAA_M
        - path: /onboardingApi/v1/onboardingProcedureTemplates/*/identityAttributes
          method: PUT
          roles:
            - T2IAA_M         
  
        ### identity provider
        - path: "/identity-api/participant/*"
          method: PUT
          roles:
            - NOTARY
        - path: "/identity-api/participant/*/credential-validity"
          method: GET
          roles:
            - NOTARY
        - path: "/identity-api/participant/*"
          method: GET
          roles:
            - IATTR_M
        - path: "/identity-api/participant/search**"
          method: GET
          roles:
            - NOTARY
        - path: "/identity-api/participant/certificate/*"
          method: DELETE
          roles:
            - IATTR_M

        - path: "/identityApi/v1/credentials/*"
          roles:
            - IATTR_M

        - path: "/identityApi/v1/credentials/*/renew"
          method: POST
          roles:
            - IATTR_M

        - path: "/identityApi/v1/credentials/*/download"
          method: GET
          roles:
            - APPLICANT
            
        ### users-roles
        - path: "/user-api/agent/identity-attributes"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/agent/identity-attributes/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/identity-attribute/search"
          method: GET
          roles:
            - T1UAR_M
            - NOTARY
        - path: "/user-api/role/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/role"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/user-api/role/*/identity-attributes"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/role/*/identity-attributes"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/user-api/role/delete-attribute"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/user-api/role/*"
          method: DELETE
          roles:
            - T1UAR_M
        - path: "/user-api/role/search"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/role/*/duplicate-identity-attribute"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/user/*"
          method: POST
          roles:
            - T1UAR_M
        - path: "/user-api/user/*"
          method: GET
          roles:
            - T1UAR_M
        - path: "/user-api/user/*"
          method: PUT
          roles:
            - T1UAR_M
        - path: "/user-api/user/*"
          method: DELETE
          roles:
            - T1UAR_M
        ### security-attributes-provider
        - path: "/sap-api/identity-attribute"
          method: POST
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/*"
          method: GET
          roles:
            - IATTR_M
            - NOTARY
        - path: "/sap-api/identity-attribute/*"
          method: PUT
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/*"
          method: DELETE
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/assignable/*"
          method: PUT
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/add-participant-type/*"
          method: PUT
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/unassign-participant/*"
          method: DELETE
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/assign-participant/*"
          method: PUT
          roles:
            - IATTR_M
        - path: "/sap-api/identity-attribute/search**"
          method: GET
          roles:
            - NOTARY
        - path: "/sap-api/identity-attribute/assign/*/*"
          method: PUT
          roles:
            - NOTARY
        - method: POST
          path: "/auth-api/keypair/import"
          roles:
            - ONBOARDER_M 
        - path: "/auth-api/keypair/**"
          roles:
            - ONBOARDER_M 
        - method: POST
          path: "/auth-api/csr/generate"
          roles:
            - ONBOARDER_M 
        - path: "/auth-api/keypair"
          method: HEAD
          roles:
            - ONBOARDER_M

        - path: "/authApi/v1/keypairs/**"
          roles:
            - ONBOARDER_M 
        - method: POST
          path: "/authApi/v1/csr/generate"
          roles:
            - ONBOARDER_M  

      logging:
        business:
          - method: POST
            path: /onboarding-api/onboarding-request
            config:
              operations:
                - ONBOARDING_REQUEST
          - method: POST
            path: /onboarding-api/onboarding-request/*/approve
            config:
              operations:
                - APPROVE_ONBOARDING_REQUEST
          - method: POST
            path: /onboarding-api/onboarding-request/*/reject
            config:
              operations:
                - REJECT_ONBOARDING_REQUEST

      microservices-info:
        microservices:
          - name: users-roles
            internalUrl: "http://users-roles.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
            detailUrl: "https://t1.{{ .Release.Namespace }}.dev.simpl-europe.eu/userApi/v1/"
          - name: sap
            internalUrl: "http://security-attributes-provider.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
            detailUrl: "https://t1.{{ .Release.Namespace }}.dev.simpl-europe.eu/sapApi/v1/"
          - name: identity-provider
            internalUrl: "http://identity-provider.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
            detailUrl: "https://t1.{{ .Release.Namespace }}.dev.simpl-europe.eu/identityApi/v1/"
          - name: onboarding
            internalUrl: "http://onboarding.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
            detailUrl: "https://t1.{{ .Release.Namespace }}.dev.simpl-europe.eu/onboardingApi/v1/"
          - name: authentication-provider
            internalUrl: "http://authentication-provider.{{ .Release.Namespace }}.svc.cluster.local:8080/v1"
