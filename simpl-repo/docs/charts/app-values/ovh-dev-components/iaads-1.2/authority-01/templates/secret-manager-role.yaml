apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "{{- include "microservices.fullname" . }}-secret-manager"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "microservices.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list", "get", "create", "update"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ejbca-init-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "microservices.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "microservices.fullname" . }}-secret-manager-binding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "microservices.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: ejbca-init-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "microservices.fullname" . }}-secret-manager
  apiGroup: rbac.authorization.k8s.io
