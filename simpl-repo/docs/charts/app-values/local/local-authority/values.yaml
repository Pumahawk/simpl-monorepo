postgresql:
  image:
    repository: bitnamilegacy/postgresql
  security:
    allowInsecureImages: true
  architecture: standalone
  auth:
    postgresPassword: postgres
  primary:
    resources:
      requests:
        memory: 256Mi
        cpu: 50m
      limits:
        memory: 512Mi
        cpu: 200m
    persistence:
      size: 1Gi
    initdb:
      scriptsConfigMap: postgresql-init-configmap
      scripts:
        restore-ejbca.sh: | #!/bin/bash set -e
          echo "Restoring dump into ejbca..."
          export PGPASSWORD="postgres"
          #pg_restore -j 1 -U postgres -d authority_ejbca /ejbca-dump/ejbca.sql
          psql -U postgres -d authority_ejbca -f /ejbca-dump/ejbca.sql
    extraVolumes:
      - name: ejbca-dump
        configMap:
          name: ejbca-dump
    extraVolumeMounts:
      - name: ejbca-dump
        mountPath: /ejbca-dump

