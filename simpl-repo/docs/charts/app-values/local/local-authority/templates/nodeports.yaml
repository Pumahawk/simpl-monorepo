---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-postgresql-nodeport"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30432
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-ejbca-nodeport"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: ejbca
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ejbca
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: https
      port: 8443
      targetPort: 8443
      nodePort: 30443
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-redis-nodeport"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      nodePort: 30379
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-keycloak-nodeport"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30090

---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-vault-nodeport"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: http
      port: 8200
      targetPort: 8200
      nodePort: 30200
