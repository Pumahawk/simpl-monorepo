apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init-configmap
data:
  init.sql: |
    -- Autogenerated init script
    {{- range .Values.global.initDatabases }}
    CREATE USER {{ .user }} WITH PASSWORD '{{ .password }}';
    CREATE DATABASE {{ .name }} OWNER {{ .user }};
    {{- end }}

  restore-ejbca.sh: |
    #!/bin/bash
    set -e
    echo "Restoring dump into ejbca..."
    export PGPASSWORD="postgres"
    #pg_restore -j 1 -U postgres -d authority_ejbca /ejbca-dump/ejbca.sql
    psql -U postgres -d authority_ejbca -f /ejbca-dump/ejbca.sql
