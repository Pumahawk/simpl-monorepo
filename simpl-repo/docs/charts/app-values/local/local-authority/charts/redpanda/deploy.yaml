---
# Source: redpanda/templates/console-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda-console
  template:
    metadata:
      labels:
        app: redpanda-console
    spec:
      containers:
        - name: console
          image: redpandadata/console:latest
          env:
            - name: KAFKA_BROKERS
              value: "redpanda.local-authority.svc.cluster.local:9092"
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: 200m
              memory: 256Gi
            requests:
              cpu: 100m
              memory: 100Mi
---
# Source: redpanda/templates/console-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: redpanda-console
spec:
  type: NodePort
  selector:
    app: redpanda-console
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30888
---
# Source: redpanda/templates/redpanda-nodeport.yaml
apiVersion: v1
kind: Service
metadata:
  name: redpanda-nodeport
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - name: kafka
      port: 19092
      targetPort: 19092
      nodePort: 30092
    - name: admin
      port: 9644
      targetPort: 9644
      nodePort: 30644
---
# Source: redpanda/templates/redpanda-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: redpanda
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: kafka-internal
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: redpanda
---
# Source: redpanda/templates/redpanda-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
    spec:
      containers:
        - name: redpanda
          image: redpandadata/redpanda:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDPANDA_OVERPROVISIONED
              value: "true"
            - name: REDPANDA_SMP
              value: "1"
            - name: REDPANDA_NODE_ID
              value: "0"
            - name: REDPANDA_KAFKA_ADDR
              value: "internal://0.0.0.0:9092,external://0.0.0.0:19092"
            - name: REDPANDA_ADVERTISE_KAFKA_ADDR
              value: "internal://redpanda.local-authority.svc.cluster.local:9092,external://localhost:30092"
          ports:
            - name: kafka-internal
              containerPort: 9092
            - name: kafka-external
              containerPort: 19092
            - name: admin
              containerPort: 9644
          resources:
            limits:
              cpu: 200m
              memory: 256Gi
            requests:
              cpu: 100m
              memory: 100Mi
