apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-console
spec:
  type: {{ .Values.console.service.type }}
  selector:
    app: {{ .Chart.Name }}-console
  ports:
    - name: http
      port: {{ .Values.console.service.port }}
      targetPort: {{ .Values.console.service.port }}
      nodePort: {{ .Values.console.service.nodePort }}
