{{- range .Values.global.initDatabases }}
{{- if .postgrest.enabled }}
{{- $name := include "replaceUnderscoreWithDash" .name }}
apiVersion: v1
kind: Service
metadata:
  name: postgrest-{{ $name }}
spec:
  type: NodePort
  selector:
    app: postgrest-{{ $name }}
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: {{ .postgrest.nodePort }}
---
{{- end }}
{{- end }}
