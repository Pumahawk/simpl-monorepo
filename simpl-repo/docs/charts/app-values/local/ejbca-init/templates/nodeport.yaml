---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-postgresql-nodeport"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30432